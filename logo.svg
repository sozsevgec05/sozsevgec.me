<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 110" width="280" height="110">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5a0"/>
      <stop offset="100%" stop-color="#00d9f5"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f5a0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00d9f5" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield background -->
  <path d="M8 8 L62 8 Q68 8 68 14 L68 52 Q68 76 35 90 Q2 76 2 52 Z"
        fill="url(#g2)" stroke="url(#g1)" stroke-width="2" filter="url(#softglow)"/>

  <!-- Shield inner line -->
  <path d="M15 16 L55 16 Q60 16 60 21 L60 50 Q60 68 35 80 Q10 68 10 50 Z"
        fill="none" stroke="url(#g1)" stroke-width="0.8" opacity="0.4"/>

  <!-- Lock shackle -->
  <path d="M24 42 L24 32 Q35 19 46 32 L46 42"
        fill="none" stroke="url(#g1)" stroke-width="3"
        stroke-linecap="round" filter="url(#glow)"/>

  <!-- Lock body -->
  <rect x="20" y="42" width="30" height="20" rx="3"
        fill="url(#g1)" filter="url(#glow)"/>

  <!-- Lock keyhole -->
  <circle cx="35" cy="50" r="3.5" fill="#0a0e1a"/>
  <rect x="33.5" y="52" width="3" height="5" rx="1" fill="#0a0e1a"/>

  <!-- SELEHATTIN centered -->
  <text x="175" y="38"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="26" font-weight="900"
        letter-spacing="2"
        text-anchor="middle"
        fill="url(#g1)"
        filter="url(#glow)">SELEHATTIN</text>

  <!-- OZSEVGEC centered -->
  <text x="175" y="65"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="26" font-weight="900"
        letter-spacing="2"
        text-anchor="middle"
        fill="url(#g1)"
        filter="url(#glow)">OZSEVGEC</text>

  <!-- Divider line -->
  <line x1="85" y1="78" x2="265" y2="78"
        stroke="url(#g1)" stroke-width="0.6" opacity="0.3"/>

  <!-- CYBERSECURITY centered bottom -->
  <text x="175" y="93"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9" font-weight="400"
        letter-spacing="4"
        text-anchor="middle"
        fill="#00d9f5" opacity="0.8">CYBERSECURITY</text>
</svg>